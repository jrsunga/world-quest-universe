name: Expo Build Check

on:
  pull_request:
    branches: [main]

jobs:
  export-check:
    name: Expo Web Export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Export web bundle (smoke test)
        # Builds the web bundle — catches broken imports and missing assets
        run: npx expo export --platform web --output-dir dist-ci
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Upload web bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: dist-ci/
          retention-days: 3
